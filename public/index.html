<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                   "Helvetica Neue", sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      padding: 16px 40px 14px;
      border-bottom: 1px solid #ebebeb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      height: 72px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    /* Calendar-style date widgets */
    .cal-widgets {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .cal-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      overflow: hidden;
      min-width: 90px;
    }

    .cal-top {
      background: #000;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 16px;
      width: 100%;
      text-align: center;
    }

    .cal-bottom {
      padding: 6px 16px;
      text-align: center;
      line-height: 1;
    }

    .cal-month {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #000;
    }

    .cal-year {
      font-size: 0.75rem;
      font-weight: 400;
      color: #888;
      margin-top: 2px;
    }

    /* ── Countdown timer ────────────────────────────── */
    .countdown-bar {
      background: #000;
      color: #fff;
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .countdown-label {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .countdown-display {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .countdown-time {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .countdown-unit {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .countdown-sep {
      font-size: 2.4rem;
      font-weight: 300;
      color: rgba(255,255,255,0.3);
      line-height: 1;
      margin: 0 2px;
    }

    .countdown-unit-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-left: 2px;
    }

    /* ── Bonus banner ───────────────────────────────── */
    .bonus-banner {
      background: #FF6B00;
      color: #fff;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bonus-label {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .bonus-sep {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.35);
    }

    .bonus-detail {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .bonus-detail .bonus-arrow {
      opacity: 0.6;
      font-weight: 300;
    }

    /* Apple-style pill: white box, orange number */
    .bonus-pill {
      background: #fff;
      border-radius: 8px;
      padding: 4px 14px;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
    }

    .bonus-pill .pill-amount {
      font-size: 1.3rem;
      font-weight: 800;
      color: #FF6B00;
      letter-spacing: -0.02em;
    }

    .bonus-pill .pill-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #FF6B00;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* ── Latest close ticker ────────────────────────── */
    .ticker-wrap {
      display: flex;
      align-items: stretch;
      background: #111;
      border-bottom: 2px solid #FF6B00;
      height: 68px;
      overflow: hidden;
    }

    .ticker-label {
      background: #FF6B00;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0 40px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      z-index: 2;
    }

    .ticker-overflow {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker-scroll 28s linear infinite;
    }

    .ticker-track.paused { animation-play-state: paused; }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      padding-right: 120px;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .ticker-star  { color: #FF6B00; font-size: 1.3rem; }
    .ticker-rep   { color: #fff; }
    .ticker-dot   { color: rgba(255,255,255,0.25); font-weight: 300; }
    .ticker-date  { color: rgba(255,255,255,0.5); font-weight: 500; font-size: 1.25rem; }

    .ticker-badge {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      border: 2px solid rgba(255,107,0,0.5);
      border-radius: 6px;
      padding: 2px 10px;
      background: rgba(255,107,0,0.08);
      line-height: 1.15;
    }
    .ticker-badge-sale {
      font-size: 1.15rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .ticker-badge-comms {
      font-size: 0.85rem;
      font-weight: 700;
      color: #4ade80;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .ticker-badge-comms-label {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: rgba(74,222,128,0.65);
      background: rgba(74,222,128,0.12);
      border-radius: 3px;
      padding: 1px 4px;
    }

    @keyframes ticker-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Table ──────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col.col-pos   { width: 110px; }
    col.col-name  { /* auto */ }
    col.col-week  { width: 14%; }
    col.col-month { width: 14%; }
    col.col-tier  { width: 13%; }

    /* Align table content with the 40px page rail */
    thead th:first-child,
    tbody td:first-child { padding-left: 0; text-align: center; }

    thead th:last-child,
    tbody td:last-child  { padding-right: 40px; }

    thead th {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      padding: 12px 14px;
      border-bottom: 1px solid #000;
      text-align: left;
      white-space: normal;
      line-height: 1.3;
    }

    thead th.center { text-align: center; }

    .week-sub {
      display: block;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #bbb;
      text-transform: none;
      margin-top: 2px;
    }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      font-size: 3.4rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      padding: 14px 14px;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td.center { text-align: center; }

    /* position number */
    .pos {
      font-size: 2rem;
      font-weight: 300;
      color: #ccc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      vertical-align: middle;
    }
    .pos.p1 { color: #000; font-weight: 800; font-size: 2.8rem; }
    .pos.p2 { color: #333; font-weight: 700; font-size: 2.6rem; }
    .pos.p3 { color: #666; font-weight: 600; font-size: 2.4rem; }

    /* ── First-place row fill ────────────────────────── */
    tbody tr.rank-first {
      background: radial-gradient(ellipse 160% 220% at 28% 50%,
        #C24010 0%, #8C2409 45%, #5E1605 100%);
    }
    tbody tr.rank-first td {
      background: transparent;
      color: #FFE8CC;
      border-bottom: 1px solid #4A1203;
    }
    tbody tr.rank-first .pos.p1       { color: #FFE8CC; }
    tbody tr.rank-first .deal-unit    { color: rgba(255, 232, 204, 0.50); }
    tbody tr.rank-first .weekly.zero  { color: rgba(255, 232, 204, 0.40); }
    tbody tr.rank-first .weekly.zero .deal-unit { color: rgba(255, 232, 204, 0.30); }

    /* name cell */
    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
      min-height: 0;
    }

    .name-text {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .name-text.gold-glow {
      color: #FFE08A;
    }

    .name-text.gold {
      color: #DAA520;
    }

    .name-text.bronze {
      color: #E07A3A;
    }

    .bonus-badge {
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #FF6B00;
      color: #fff;
      padding: 5px 13px;
      border-radius: 7px;
      white-space: nowrap;
    }

    /* weekly + monthly number columns */
    tbody td:nth-child(3),
    tbody td:nth-child(4) {
      font-weight: 700;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .weekly.zero { color: #ddd; }

    .deal-unit {
      font-size: 0.35em;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.18);
      vertical-align: super;
      letter-spacing: 0.02em;
    }
    .weekly.zero .deal-unit { color: rgba(0, 0, 0, 0.1); }

    /* tier badge */
    .tier-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .tier-badge {
      display: inline-block;
      /* Full size on wide screens, scales down fluidly as column narrows,
         floors at 0.6rem so it never becomes unreadable */
      font-size: clamp(0.6rem, 1.3vw, 1.15rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: clamp(6px, 0.5vw, 10px) clamp(8px, 0.8vw, 14px);
      border-radius: 8px;
      line-height: 1.35;
      text-align: center;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
    }

    .tier-starter           { background: #f0f0f0; color: #555; }
    .tier-rising-performer  { background: #dbeafe; color: #1d4ed8; }
    .tier-top-closer        { background: #ede9fe; color: #6d28d9; }
    .tier-elite-closer      { background: #fef3c7; color: #92400e; }
    .tier-sales-leader      { background: #fee2e2; color: #b91c1c; }
    .tier-default           { background: #f0f0f0; color: #555; }

    /* ── Deal-flash animation ───────────────────────── */
    @keyframes deal-flash {
      0%   { background: rgba(255, 107, 0, 0.22); }
      100% { background: transparent; }
    }
    @keyframes deal-flash-first {
      0%   { background: rgba(255, 224, 138, 0.30); }
      100% { background: transparent; }
    }
    tbody tr.deal-flash td            { animation: deal-flash       2.4s ease-out forwards; }
    tbody tr.rank-first.deal-flash td { animation: deal-flash-first 2.4s ease-out forwards; }

    /* ── Countdown urgency pulse ─────────────────────── */
    @keyframes cd-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
    .countdown-time.pulse { animation: cd-pulse 1s ease-in-out infinite; }

    /* ── Utility ────────────────────────────────────── */
    .loading, .error {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #999;
      font-weight: 300;
    }
    .error { color: #c00; }

    footer {
      padding: 5px 28px;
      font-size: 0.68rem;
      background: #080808;
      color: rgba(255,255,255,0.2);
      border-top: 1px solid #111;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    }

    /* ── Shared scroll keyframe (used by sub-ticker) ─── */
    @keyframes news-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Solar Panel ─────────────────────────────────── */
    .solar-panel {
      flex: 1;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      background: #0d0d0d;
      overflow: hidden;
      border-top: 2px solid #1a3a5c;
    }

    .solar-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 48px;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    .solar-intel-label {
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #3b82f6;
    }

    .solar-intel-label::after {
      content: '_';
      animation: blink 1.1s step-end infinite;
      margin-left: 3px;
      opacity: 0.7;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0; }
    }

    .solar-panel-timestamp {
      font-size: 0.82rem;
      font-weight: 600;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.05em;
    }

    .solar-feature {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 36px;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .solar-feature::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .solar-source {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 18px;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    }

    .solar-headline {
      font-size: 2.3rem;
      font-weight: 650;
      color: #f5f5f5;
      line-height: 1.25;
      letter-spacing: -0.01em;
      max-width: 95%;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .solar-headline.fading {
      opacity: 0;
      transform: translateY(8px);
    }

    .solar-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #3b82f6;
      width: 0%;
      transition: width 8s linear;
    }

    .solar-sub-ticker {
      height: 40px;
      display: flex;
      align-items: stretch;
      background: #080808;
      border-top: 1px solid #1a1a1a;
      overflow: hidden;
      flex-shrink: 0;
    }

    .solar-sub-ticker-label {
      background: #1d3a6e;
      color: rgba(255,255,255,0.8);
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0 18px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      border-right: 1px solid #2a4a8e;
    }

    .solar-sub-ticker-overflow {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .solar-sub-ticker-track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      animation: news-scroll 90s linear infinite;
    }

    .solar-sub-ticker-track:empty { display: none; }

    .solar-sub-ticker-item {
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.01em;
    }

    .solar-sub-ticker-sep {
      color: #3b82f6;
      font-size: 0.65rem;
      padding: 0 36px;
      opacity: 0.5;
    }

    /* ── #content: don't grow, table owns its height ─── */
    #content { flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <img class="header-logo" src="/ImpressdConsultingLogo_Full.jpeg" alt="Impressd" />
  <div class="cal-widgets">
    <div class="cal-widget">
      <div class="cal-top">Monthly</div>
      <div class="cal-bottom">
        <div class="cal-month" id="cal-month">—</div>
        <div class="cal-year"  id="cal-year">—</div>
      </div>
    </div>
    <div class="cal-widget">
      <div class="cal-top">Week of</div>
      <div class="cal-bottom">
        <div class="cal-month" id="cal-week-day">—</div>
        <div class="cal-year"  id="cal-week-mon">—</div>
      </div>
    </div>
  </div>
</header>

<div class="countdown-bar">
  <span class="countdown-label">Week ends in</span>
  <div class="countdown-display">
    <div class="countdown-unit">
      <span class="countdown-time" id="cd-hours">--</span>
      <span class="countdown-unit-label">hrs</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-time" id="cd-mins">--</span>
      <span class="countdown-unit-label">min</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-unit">
      <span class="countdown-time" id="cd-secs">--</span>
      <span class="countdown-unit-label">sec</span>
    </div>
  </div>
</div>

<div class="bonus-banner" id="bonus-banner" style="display:none">
  <span class="bonus-label">This Week's Bonus</span>
  <span class="bonus-sep"></span>
  <span class="bonus-detail">
    <span class="bonus-req" id="bonus-req"></span>
    <span class="bonus-arrow">→</span>
    <span class="bonus-pill">
      <span class="pill-amount" id="pill-amount"></span>
      <span class="pill-label">bonus</span>
    </span>
  </span>
</div>

<div class="ticker-wrap">
  <div class="ticker-label">Latest Close</div>
  <div class="ticker-overflow">
    <div class="ticker-track" id="ticker-track">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<div id="content" class="loading">Fetching data…</div>

<div class="solar-panel" id="solar-panel">
  <div class="solar-panel-header">
    <span class="solar-intel-label">Solar Intel</span>
    <span class="solar-panel-timestamp" id="solar-timestamp">—</span>
  </div>
  <div class="solar-feature" id="solar-feature">
    <div class="solar-source" id="solar-source">LOADING...</div>
    <div class="solar-headline" id="solar-headline">Fetching solar market intelligence...</div>
    <div class="solar-progress" id="solar-progress"></div>
  </div>
  <div class="solar-sub-ticker">
    <div class="solar-sub-ticker-label">Solar Feed</div>
    <div class="solar-sub-ticker-overflow">
      <div class="solar-sub-ticker-track" id="solar-sub-ticker-track"></div>
    </div>
  </div>
</div>

<footer>
  <span>Impressd Solar Sales</span>
  <span id="updated"></span>
</footer>

<script>
  // ── Feature flags ───────────────────────────────────
  // Set to true during a bonus week to re-enable bonus banner + badges
  const BONUS_WEEK = false;

  function tierClass(name) {
    const map = {
      'starter':          'tier-starter',
      'rising performer': 'tier-rising-performer',
      'top closer':       'tier-top-closer',
      'elite closer':     'tier-elite-closer',
      'sales leader':     'tier-sales-leader',
    };
    return map[(name || '').toLowerCase()] || 'tier-default';
  }

  async function load() {
    const content  = document.getElementById('content');
    const banner   = document.getElementById('bonus-banner');
    const bonusReq = document.getElementById('bonus-req');
    const pillAmt  = document.getElementById('pill-amount');

    try {
      const res  = await fetch('/api/leaderboard');
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const { rows, weekStart, bonusThreshold, bonusAmount, latestDeal } = data;

      // Calendar widgets
      const TZ = 'Australia/Melbourne';
      const now = new Date();
      document.getElementById('cal-month').textContent =
        now.toLocaleDateString('en-AU', { timeZone: TZ, month: 'long' }).toUpperCase();
      document.getElementById('cal-year').textContent =
        now.toLocaleDateString('en-AU', { timeZone: TZ, year: 'numeric' });

      // Week-of widget — show the Monday date in Melbourne time
      const weekStartDate = new Date(weekStart + 'T00:00:00');
      document.getElementById('cal-week-day').textContent =
        weekStartDate.toLocaleDateString('en-AU', { timeZone: TZ, day: 'numeric', month: 'short' }).toUpperCase();
      document.getElementById('cal-week-mon').textContent =
        weekStartDate.toLocaleDateString('en-AU', { timeZone: TZ, year: 'numeric' });

      // Deal-change detection → celebration sound + row flash
      const totalWeekly = rows.reduce((sum, r) => sum + r.weeklyDeals, 0);
      const gainedIds = prevTotalWeekly !== null
        ? rows.filter(r => (r.weeklyDeals || 0) > (prevWeeklyCounts[r.id] || 0)).map(r => r.id)
        : [];
      if (gainedIds.length) playCelebration();
      prevTotalWeekly = totalWeekly;
      prevWeeklyCounts = Object.fromEntries(rows.map(r => [r.id, r.weeklyDeals]));

      // Latest close ticker
      updateLatestClose(latestDeal);

      // Bonus banner — only shown during a bonus week
      if (BONUS_WEEK) {
        banner.style.display = 'flex';
        bonusReq.textContent = `${bonusThreshold} sales`;
        pillAmt.textContent  = `$${bonusAmount.toLocaleString()}`;
      } else {
        banner.style.display = 'none';
      }

      document.getElementById('updated').textContent =
        `Updated ${new Date().toLocaleTimeString('en-AU', { timeZone: 'Australia/Melbourne', hour: '2-digit', minute: '2-digit' })}`;

      if (rows.length === 0) {
        content.className = 'loading';
        content.textContent = 'No active reps found.';
        return;
      }

      content.className = '';
      content.innerHTML = `
        <table>
          <colgroup>
            <col class="col-pos">
            <col class="col-name">
            <col class="col-week">
            <col class="col-month">
            <col class="col-tier">
          </colgroup>
          <thead>
            <tr>
              <th>#</th>
              <th>Rep</th>
              <th class="center">Sales This Week</th>
              <th class="center">Sales This Month</th>
              <th class="center">Rank</th>
            </tr>
          </thead>
          <tbody>
            ${rows.slice(0, 10).map((row, i) => {
              const posClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
              const wkClass  = row.weeklyDeals === 0 ? 'weekly zero' : 'weekly';
              const tClass   = tierClass(row.tierName);
              const bonus    = BONUS_WEEK && row.bonusAchieved
                ? `<span class="bonus-badge">Bonus ✓</span>`
                : '';
              const rankEmoji = i === 0 ? '🏆' : i === 1 ? '2️⃣' : i === 2 ? '3️⃣' : '';
              const nameClass = i === 0 ? 'name-text gold-glow'
                              : i === 1 ? 'name-text gold'
                              : i === 2 ? 'name-text bronze'
                              : 'name-text';
              return `
                <tr data-id="${row.id}"${i === 0 ? ' class="rank-first"' : ''}>
                  <td><span class="pos ${posClass}">${rankEmoji || i + 1}</span></td>
                  <td>
                    <div class="name-cell">
                      <span class="${nameClass}">${row.name}</span>
                      ${bonus}
                    </div>
                  </td>
                  <td class="center ${wkClass}">${row.weeklyDeals}<span class="deal-unit">/w</span></td>
                  <td class="center">${row.monthlyDeals}<span class="deal-unit">/m</span></td>
                  <td class="center">
                    <div class="tier-cell">
                      <span class="tier-badge ${tClass}">${row.tierName}</span>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
      // Flash rows that just gained a deal
      gainedIds.forEach(id => {
        const tr = content.querySelector(`tr[data-id="${id}"]`);
        if (!tr) return;
        tr.classList.remove('deal-flash');
        void tr.offsetWidth; // force reflow to restart animation
        tr.classList.add('deal-flash');
      });

    } catch (err) {
      content.className = 'error';
      content.textContent = `Error: ${err.message}`;
    }
  }

  // ── Celebration sound (Web Audio API) ──────────────
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playCelebration() {
    const ctx = getAudioCtx();
    // Ascending fanfare: C5 → E5 → G5 → C6
    const notes = [523.25, 659.25, 783.99, 1046.50];
    const times = [0, 0.12, 0.24, 0.38];
    const dur   = [0.18, 0.18, 0.18, 0.45];

    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.type = 'sine';
      osc.frequency.value = freq;

      const t0 = ctx.currentTime + times[i];
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.28, t0 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur[i]);

      osc.start(t0);
      osc.stop(t0 + dur[i]);
    });

    // Sparkle layer — high shimmer
    [1318.5, 1568, 2093].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t0 = ctx.currentTime + 0.38 + i * 0.06;
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.12, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.2);
      osc.start(t0);
      osc.stop(t0 + 0.22);
    });
  }

  // ── Time-ago helper — handles YYYY-MM-DD date strings ──
  function timeAgo(closedAt) {
    if (!closedAt) return '';
    // Date-only string (Airtable Deposit Date): "YYYY-MM-DD"
    if (/^\d{4}-\d{2}-\d{2}$/.test(closedAt)) {
      const [y, m, d] = closedAt.split('-').map(Number);
      const then = new Date(y, m - 1, d);
      const todayMelb = new Date(new Date().toLocaleString('en-US', { timeZone: 'Australia/Melbourne' }));
      todayMelb.setHours(0, 0, 0, 0);
      const days = Math.round((todayMelb - then) / 86400000);
      if (days === 0) return 'Today';
      if (days === 1) return 'Yesterday';
      return `${days} days ago`;
    }
    // Full ISO timestamp fallback
    const secs = Math.floor((Date.now() - new Date(closedAt)) / 1000);
    if (secs < 60)   return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
    return `${Math.floor(secs / 86400)}d ago`;
  }

  // ── Deal-change detection ───────────────────────────
  let prevTotalWeekly = null;
  let prevWeeklyCounts = {}; // repId → weeklyDeals

  // ── Solar panel state ────────────────────────────────
  let solarArticles   = [];
  let solarCurrentIdx = 0;
  let solarCycleTimer = null;

  function fmtMoney(val) {
    if (val == null) return null;
    const n = Number(val);
    if (isNaN(n)) return null;
    return '$' + Math.round(n).toLocaleString('en-US');
  }

  function updateLatestClose(latestDeal) {
    const track = document.getElementById('ticker-track');
    if (!track) return;

    let itemHtml;
    if (!latestDeal) {
      itemHtml = `<span class="ticker-item">
        <span class="ticker-star">★</span>
        <span class="ticker-rep">No closes recorded yet</span>
      </span>`;
    } else {
      const ago = timeAgo(latestDeal.closedAt);
      const sale = fmtMoney(latestDeal.salePrice);
      const comms = fmtMoney(latestDeal.comms);
      const badgeHtml = (sale || comms) ? `
        <span class="ticker-badge">
          ${sale  ? `<span class="ticker-badge-sale">${sale}</span>`   : ''}
          ${comms ? `<span class="ticker-badge-comms">${comms} <span class="ticker-badge-comms-label">COMMS</span></span>` : ''}
        </span>` : '';
      itemHtml = `<span class="ticker-item">
        <span class="ticker-star">★</span>
        <span class="ticker-rep">${latestDeal.repName}</span>
        ${badgeHtml}
        <span class="ticker-dot">·</span>
        <span class="ticker-date">${ago}</span>
      </span>`;
    }
    // Fill the track: repeat enough times to guarantee full-width coverage.
    // -50% animation still loops seamlessly with any even number of copies.
    const COPIES = 12;
    track.innerHTML = itemHtml.repeat(COPIES);
  }

  // Returns Melbourne's UTC offset in ms at the given instant
  function getMelbOffset(date) {
    const utc  = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
    const melb = new Date(date.toLocaleString('en-US', { timeZone: 'Australia/Melbourne' }));
    return melb - utc;
  }

  function updateCountdown() {
    const now = new Date();
    const offsetMs = getMelbOffset(now);

    // Shift now into Melbourne wall-clock coordinates (using UTC methods for clean arithmetic)
    const melbNow = new Date(now.getTime() + offsetMs);
    const melbDay = melbNow.getUTCDay(); // 0=Sun in Melbourne

    // Days until end of THIS Sunday (0 if today is already Sunday in Melbourne)
    const daysUntilSun = (7 - melbDay) % 7;

    // Target: that Sunday at 23:59:59 Melbourne wall-clock time
    const targetMelb = new Date(melbNow.getTime());
    targetMelb.setUTCDate(melbNow.getUTCDate() + daysUntilSun);
    targetMelb.setUTCHours(23, 59, 59, 999);

    // Convert back to actual UTC
    const target = new Date(targetMelb.getTime() - offsetMs);

    const diff = target - now;
    if (diff <= 0) { updateCountdown(); return; }

    const totalSecs = Math.floor(diff / 1000);
    const h = Math.floor(totalSecs / 3600);
    const m = Math.floor((totalSecs % 3600) / 60);
    const s = totalSecs % 60;

    document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
    document.getElementById('cd-mins').textContent  = String(m).padStart(2, '0');
    document.getElementById('cd-secs').textContent  = String(s).padStart(2, '0');

    // Pulse digits when under 1 hour
    document.querySelectorAll('.countdown-time').forEach(el => {
      el.classList.toggle('pulse', h === 0);
    });
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);

  load();
  setInterval(load, 90 * 1000);

  // ── Solar panel ──────────────────────────────────────
  function updateSolarTimestamp() {
    const el = document.getElementById('solar-timestamp');
    if (el) el.textContent = new Date().toLocaleTimeString('en-AU', {
      timeZone: 'Australia/Melbourne',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  function showSolarArticle(idx) {
    if (!solarArticles.length) return;
    const article  = solarArticles[idx % solarArticles.length];
    const headline = document.getElementById('solar-headline');
    const source   = document.getElementById('solar-source');
    const progress = document.getElementById('solar-progress');
    if (!headline || !source) return;

    headline.classList.add('fading');

    setTimeout(() => {
      headline.textContent = article.title;

      const pubDate = article.publishedAt
        ? new Date(article.publishedAt).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })
        : '';
      source.textContent = article.source
        ? `${article.source.toUpperCase()}${pubDate ? '  ·  ' + pubDate : ''}`
        : pubDate;

      headline.classList.remove('fading');

      if (progress) {
        progress.style.transition = 'none';
        progress.style.width = '0%';
        void progress.offsetWidth;
        progress.style.transition = 'width 8s linear';
        progress.style.width = '100%';
      }
    }, 520);
  }

  function cycleHeadlines() {
    if (!solarArticles.length) return;
    solarCurrentIdx = (solarCurrentIdx + 1) % solarArticles.length;
    showSolarArticle(solarCurrentIdx);
  }

  function buildSubTicker(articles) {
    const track = document.getElementById('solar-sub-ticker-track');
    if (!track || !articles.length) return;
    const inner = articles.map(a =>
      `<span class="solar-sub-ticker-item">${a.title}</span>` +
      `<span class="solar-sub-ticker-sep">◆</span>`
    ).join('');
    track.innerHTML = inner + inner;
  }

  let newsdataKey = null;

  async function loadNews() {
    try {
      // Fetch API key from server if we don't have it yet
      if (!newsdataKey) {
        const cfg = await fetch('/api/newsconfig');
        const cfgData = await cfg.json();

        newsdataKey = cfgData.key;
      }
      if (!newsdataKey) return;

      // Call newsdata.io directly from the browser (avoids datacenter IP blocks)
      const q = encodeURIComponent('residential solar rebate OR solar incentive OR solar policy');
      const url = `https://newsdata.io/api/1/latest?apikey=${newsdataKey}&q=${q}&language=en&size=10`;
      const res  = await fetch(url);
      const data = await res.json();

      if (data.status !== 'success' || !data.results || !data.results.length) return;

      solarArticles = data.results
        .filter(a => a.title && a.title !== '[Removed]')
        .map(a => ({
          title:       a.title,
          source:      a.source_name || '',
          publishedAt: a.pubDate || null,
        }));

      if (!solarArticles.length) return;
      solarCurrentIdx = 0;
      showSolarArticle(0);
      buildSubTicker(solarArticles);
      if (solarCycleTimer) clearInterval(solarCycleTimer);
      solarCycleTimer = setInterval(cycleHeadlines, 8000);
    } catch (e) {
      console.error('Solar news load error:', e);
    }
  }

  loadNews();
  setInterval(loadNews, 10 * 60 * 1000);

  updateSolarTimestamp();
  setInterval(updateSolarTimestamp, 1000);
</script>
</body>
</html>
