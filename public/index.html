<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      color: #000;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      padding: 16px 40px 14px;
      border-bottom: 3px solid #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    /* Calendar-style date widget */
    .cal-widget {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      min-width: 100px;
    }

    .cal-top {
      background: #000;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 5px 16px;
      width: 100%;
      text-align: center;
    }

    .cal-bottom {
      padding: 6px 16px;
      text-align: center;
      line-height: 1;
    }

    .cal-month {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #000;
    }

    .cal-year {
      font-size: 0.75rem;
      font-weight: 400;
      color: #888;
      margin-top: 2px;
    }

    /* ── Bonus banner ───────────────────────────────── */
    .bonus-banner {
      background: #FF6B00;
      color: #fff;
      padding: 10px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bonus-label {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .bonus-sep {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.35);
    }

    .bonus-detail {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .bonus-detail .bonus-req {
      /* plain white text */
    }

    .bonus-detail .bonus-arrow {
      opacity: 0.6;
      font-weight: 300;
    }

    /* Apple-style pill: white box, orange number */
    .bonus-pill {
      background: #fff;
      border-radius: 8px;
      padding: 4px 14px;
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
    }

    .bonus-pill .pill-amount {
      font-size: 1.3rem;
      font-weight: 800;
      color: #FF6B00;
      letter-spacing: -0.02em;
    }

    .bonus-pill .pill-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #FF6B00;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    /* ── Table ──────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col.col-pos   { width: 80px; }
    col.col-name  { /* auto */ }
    col.col-week  { width: 14%; }
    col.col-month { width: 14%; }
    col.col-tier  { width: 13%; }

    thead th {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #888;
      padding: 12px 14px;
      border-bottom: 2px solid #000;
      text-align: left;
      white-space: normal;
      line-height: 1.3;
    }

    thead th.center { text-align: center; }

    .week-sub {
      display: block;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #bbb;
      text-transform: none;
      margin-top: 2px;
    }

    tbody tr { border-bottom: 1px solid #e8e8e8; }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      font-size: 3.4rem;
      font-weight: 500;
      padding: 14px 14px;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td.center { text-align: center; }

    /* position number */
    .pos {
      font-size: 2rem;
      font-weight: 300;
      color: #ccc;
    }
    .pos.p1 { color: #000; font-weight: 800; font-size: 2.4rem; }
    .pos.p2 { color: #333; font-weight: 700; font-size: 2.2rem; }
    .pos.p3 { color: #666; font-weight: 600; font-size: 2rem; }

    /* name cell */
    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .name-text {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bonus-badge {
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #FF6B00;
      color: #fff;
      padding: 5px 13px;
      border-radius: 7px;
      white-space: nowrap;
    }

    /* weekly number */
    .weekly      { font-weight: 700; }
    .weekly.zero { color: #ddd; }

    /* tier badge */
    .tier-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .tier-badge {
      display: inline-block;
      /* Full size on wide screens, scales down fluidly as column narrows,
         floors at 0.6rem so it never becomes unreadable */
      font-size: clamp(0.6rem, 1.3vw, 1.15rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: clamp(6px, 0.5vw, 10px) clamp(8px, 0.8vw, 14px);
      border-radius: 8px;
      line-height: 1.35;
      text-align: center;
      white-space: normal;
      word-break: normal;
      overflow-wrap: normal;
    }

    .tier-starter           { background: #f0f0f0; color: #555; }
    .tier-rising-performer  { background: #dbeafe; color: #1d4ed8; }
    .tier-top-closer        { background: #ede9fe; color: #6d28d9; }
    .tier-elite-closer      { background: #fef3c7; color: #92400e; }
    .tier-sales-leader      { background: #fee2e2; color: #b91c1c; }
    .tier-default           { background: #f0f0f0; color: #555; }

    /* ── Utility ────────────────────────────────────── */
    .loading, .error {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #999;
      font-weight: 300;
    }
    .error { color: #c00; }

    footer {
      margin-top: auto;
      padding: 10px 40px;
      border-top: 1px solid #ebebeb;
      font-size: 0.85rem;
      color: #ccc;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <h1>Sales Leaderboard</h1>
  <div class="cal-widget" id="cal-widget">
    <div class="cal-top">Monthly</div>
    <div class="cal-bottom">
      <div class="cal-month" id="cal-month">—</div>
      <div class="cal-year"  id="cal-year">—</div>
    </div>
  </div>
</header>

<div class="bonus-banner" id="bonus-banner" style="display:none">
  <span class="bonus-label">This Week's Bonus</span>
  <span class="bonus-sep"></span>
  <span class="bonus-detail">
    <span class="bonus-req" id="bonus-req"></span>
    <span class="bonus-arrow">→</span>
    <span class="bonus-pill">
      <span class="pill-amount" id="pill-amount"></span>
      <span class="pill-label">bonus</span>
    </span>
  </span>
</div>

<div id="content" class="loading">Fetching data…</div>

<footer>
  <span>Impressd Solar Sales</span>
  <span id="updated"></span>
</footer>

<script>
  function tierClass(name) {
    const map = {
      'starter':          'tier-starter',
      'rising performer': 'tier-rising-performer',
      'top closer':       'tier-top-closer',
      'elite closer':     'tier-elite-closer',
      'sales leader':     'tier-sales-leader',
    };
    return map[(name || '').toLowerCase()] || 'tier-default';
  }

  async function load() {
    const content  = document.getElementById('content');
    const banner   = document.getElementById('bonus-banner');
    const bonusReq = document.getElementById('bonus-req');
    const pillAmt  = document.getElementById('pill-amount');

    try {
      const res  = await fetch('/api/leaderboard');
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const { rows, weekStart, bonusThreshold, bonusAmount } = data;

      // Calendar widget
      const today = new Date();
      document.getElementById('cal-month').textContent =
        today.toLocaleDateString('en-AU', { month: 'long' }).toUpperCase();
      document.getElementById('cal-year').textContent =
        today.getFullYear();

      // Bonus banner
      banner.style.display = 'flex';
      bonusReq.textContent = `${bonusThreshold} sales`;
      pillAmt.textContent  = `$${bonusAmount.toLocaleString()}`;

      // Week-of label
      const weekStartDate = new Date(weekStart + 'T00:00:00');
      const weekOf = weekStartDate.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });

      document.getElementById('updated').textContent =
        `Updated ${new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' })}`;

      if (rows.length === 0) {
        content.className = 'loading';
        content.textContent = 'No active reps found.';
        return;
      }

      content.className = '';
      content.innerHTML = `
        <table>
          <colgroup>
            <col class="col-pos">
            <col class="col-name">
            <col class="col-week">
            <col class="col-month">
            <col class="col-tier">
          </colgroup>
          <thead>
            <tr>
              <th>#</th>
              <th>Rep</th>
              <th class="center">
                Sales This Week
                <span class="week-sub">w/c ${weekOf}</span>
              </th>
              <th class="center">Sales This Month</th>
              <th class="center">Rank</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row, i) => {
              const posClass = i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
              const wkClass  = row.weeklyDeals === 0 ? 'weekly zero' : 'weekly';
              const tClass   = tierClass(row.tierName);
              const bonus    = row.bonusAchieved
                ? `<span class="bonus-badge">Bonus ✓</span>`
                : '';
              return `
                <tr>
                  <td class="center"><span class="pos ${posClass}">${i + 1}</span></td>
                  <td>
                    <div class="name-cell">
                      <span class="name-text">${row.name}</span>
                      ${bonus}
                    </div>
                  </td>
                  <td class="center ${wkClass}">${row.weeklyDeals}</td>
                  <td class="center">${row.monthlyDeals}</td>
                  <td class="center">
                    <div class="tier-cell">
                      <span class="tier-badge ${tClass}">${row.tierName}</span>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    } catch (err) {
      content.className = 'error';
      content.textContent = `Error: ${err.message}`;
    }
  }

  load();
  setInterval(load, 2 * 60 * 1000);
</script>
</body>
</html>
